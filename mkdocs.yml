site_name: goauth
site_description: Router-agnostic Go authentication library
site_url: https://amalgamated-tools.github.io/goauth
repo_url: https://github.com/amalgamated-tools/goauth
repo_name: amalgamated-tools/goauth
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - auth package:
    - auth/index.md
    - JWT Manager: auth/jwt.md
    - Middleware: auth/middleware.md
    - RBAC: auth/rbac.md
    - Rate Limiting: auth/rate-limiting.md
    - Crypto Utilities: auth/crypto.md
    - Store Interfaces: auth/store-interfaces.md
    - TOTP / MFA: auth/totp.md
  - handler package:
    - handler/index.md
    - Email / Password: handler/auth.md
    - OIDC / SSO: handler/oidc.md
    - API Keys: handler/api-keys.md
    - Sessions: handler/sessions.md
    - Passkeys (WebAuthn): handler/passkeys.md
    - TOTP: handler/totp.md
    - Magic Links: handler/magic-links.md
    - Email Verification: handler/email-verification.md
    - Password Reset: handler/password-reset.md
    - Cookie Helpers: handler/cookies.md
  - maintenance package: maintenance.md
  - smtp package: smtp.md
  - Security Notes: security.md
