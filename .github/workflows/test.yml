name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [synchronize, opened, reopened]

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull requests. Use with `only-new-issues` option.
  pull-requests: read

# Cancel in-progress runs for the same branch/PR when a new push arrives.
# Main-branch runs are never cancelled so merge results are always recorded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
 # Lint and test run fully in parallel with frontend-checks; the dist placeholder
  # (.gitkeep) in internal/server/dist satisfies //go:embed all:dist for compilation.
  go-lint:
    runs-on: ubuntu-latest
    name: Go Lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.1
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.11.3

      - name: Enforce testify/require in tests
        run: make lint-require

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "Go files are not formatted. Please run 'go fmt ./...'"
            gofmt -d .
            exit 1
          fi

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Please run 'go mod tidy'."
            git diff go.mod go.sum
            exit 1
          fi

  go-test:
    runs-on: ubuntu-latest
    name: Go Tests
    timeout-minutes: 15
    outputs:
      coverage-pct: ${{ steps.coverage.outputs.pct }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.1
          cache: true
          cache-dependency-path: go.sum

      - name: Cache exiftool apt package
        id: exiftool-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ${{ runner.temp }}/apt-cache
          # Stable key tied to the OS only; bump the version suffix (v1 → v2) only
          # when a different exiftool version is intentionally required.
          # Previously used hashFiles('.github/workflows/test.yml'), which caused
          # cache misses on every unrelated workflow edit (action bumps, comments, etc.).
          key: ${{ runner.os }}-apt-exiftool-v1
          restore-keys: |
            ${{ runner.os }}-apt-exiftool-

      - name: Install exiftool
        run: |
          mkdir -p "${{ runner.temp }}/apt-cache"
          if [ "${{ steps.exiftool-cache.outputs.cache-hit }}" = "true" ]; then
            sudo apt-get -o dir::cache::archives="${{ runner.temp }}/apt-cache" install -y -q --no-download libimage-exiftool-perl
          else
            sudo apt-get update -qq
            sudo apt-get -o dir::cache::archives="${{ runner.temp }}/apt-cache" install -y -q libimage-exiftool-perl
          fi
          exiftool -ver

      - name: Run Go tests
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display Go coverage summary
        id: coverage
        run: |
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/{print $NF}')
          echo "pct=${PCT}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${PCT}"

      - name: Check for known vulnerabilities
        run: |
          # govulncheck exit codes: 0 = no vulns, 3 = vulns found, other = error.
          # Stdlib vulns require a Go toolchain update and cannot be fixed in-repo,
          # so we only fail on non-stdlib (third-party) vulnerabilities.
          set +e
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 -format json ./... > vulncheck.json 2>vulncheck.stderr
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "No vulnerabilities found."
            exit 0
          fi

          # Any exit code other than 3 is an execution error — fail hard.
          if [ "$rc" -ne 3 ]; then
            echo "::error::govulncheck failed with exit code $rc"
            cat vulncheck.stderr
            exit 1
          fi

          # Count non-stdlib findings (module path is not "stdlib").
          # Fail closed: if jq parsing fails, treat as non-stdlib to avoid masking issues.
          if ! jq_out=$(jq -r 'select(.finding != null) | .finding.trace[0].module' vulncheck.json 2>/dev/null); then
            non_stdlib=1
          else
            non_stdlib=$(echo "$jq_out" | (grep -cv '^stdlib$' || echo 0))
          fi

          # Render a human-readable summary from the JSON instead of re-running govulncheck.
          summary=$(jq -r '
            select(.finding != null)
            | .finding as $f
            | ($f.osv // "unknown") as $osv
            | ($f.trace[0].module // "unknown") as $module
            | ($f.trace[0].package // "unknown") as $package
            | "- \($osv) | module: \($module) | package: \($package)"
          ' vulncheck.json 2>/dev/null)

          if [ -n "$summary" ]; then
            echo "Vulnerability summary:"
            echo "$summary"
          else
            echo "Vulnerabilities were detected, but no summary could be rendered from vulncheck.json."
            echo "Raw govulncheck JSON output:"
            cat vulncheck.json
          fi

          if [ "$non_stdlib" -gt 0 ]; then
            echo "::error::Non-stdlib vulnerabilities found"
            exit 1
          fi

          echo "::warning::Only Go stdlib vulnerabilities found (requires Go toolchain update to fix)"
          exit 0

  go-all:
    needs: [go-lint, go-test]
    runs-on: ubuntu-latest
    if: always()
    # This job only runs a shell check; 2 minutes is more than enough.
    # Without a timeout, a hung runner would default to 6 hours.
    timeout-minutes: 2
    steps:
      - name: Check all Go jobs passed (or skipped for docs-only)
        run: |
          if [[ "${{ needs.go-lint.result }}" != "success" || "${{ needs.go-test.result }}" != "success" ]]; then
            echo "One or more Go jobs failed"
            exit 1
          fi
